<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upcoming Birthdays | Birthday Project</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <main class="container">
        <section class="card">
            <h2>Upcoming Birthdays</h2>
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Birthday</th>
                        <th>Days Left</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                        <tr>
                            <td>{{ user.name }}</td>
                            <td>{{ user.email }}</td>
                            <td>{{ user.birthday }}</td>
                            <td>{{ user.days_left }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
            <a class="text-link" href="/admin">Back to Admin</a>
        </section>
    </main>
</body>
</html>
