services:
  - type: web
    name: birthday-project
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --bind 0.0.0.0:$PORT app:app
    autoDeploy: true
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: dravid707@gmail.com
      - key: ADMIN_PASSWORD
        value: dravid7.dm
      - key: MONGO_URI
        sync: false
      - key: MAIL_SENDER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
